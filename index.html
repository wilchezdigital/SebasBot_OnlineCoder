<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Código en Vivo</title>
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: monospace;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        textarea {
            flex: 1;
            padding: 15px;
            font-size: 14px;
            border: none;
            border-right: 2px solid #333;
            resize: none;
            background-color: #1e1e1e;
            color: #d4d4d4;
            outline: none;
        }
        iframe {
            flex: 1;
            border: none;
            background-color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="panel">
        <textarea id="editor" placeholder="Escribe HTML, CSS (etiqueta <style>) o JS (etiqueta <script>) aquí..."></textarea>
    </div>
    <div class="panel">
        <iframe id="vista-previa"></iframe>
    </div>

    <script>
        // Selección de los elementos del DOM
        const editor = document.getElementById('editor');
        const iframe = document.getElementById('vista-previa');

        // Función para actualizar el iframe
        function actualizarVistaPrevia() {
            const codigo = editor.value;
            const documentoIframe = iframe.contentWindow.document;
            
            // Sobreescribir el documento del iframe con el código del textarea
            documentoIframe.open();
            documentoIframe.write(codigo);
            documentoIframe.close();
        }

        // Ejecutar la actualización cada vez que se escribe en el textarea
        editor.addEventListener('input', actualizarVistaPrevia);
    </script>
</body>
</html>
