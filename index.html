<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Código en Vivo OnlineCoder</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    
    <style>
        :root {
            --bg: #1e1e1e;
            --card: #111218;
            --text: #e6e6f0;
            --primary: #ff6a00;
            --primary-2: #ff8c1a;
            --stroke: #242634;
        }

        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* BARRA SUPERIOR */
        header {
            height: 60px;
            background: rgba(11, 12, 16, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--stroke);
            justify-content: space-between;
            z-index: 10;
        }

        .brand { font-weight: 800; font-size: 1.2rem; }
        .grad {
            background: linear-gradient(90deg, var(--primary), var(--primary-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ÁREA DE TRABAJO */
        main {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .panel {
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #left-panel { flex: 1; min-width: 100px; }
        #right-panel { flex: 1; min-width: 100px; background: white; }

        /* RESIZER MEJORADO */
        #resizer {
            width: 6px;
            background: var(--stroke);
            cursor: col-resize;
            transition: background 0.2s;
            z-index: 5;
            position: relative;
        }
        #resizer:hover, #resizer.active { background: var(--primary); }

        /* Evita que el iframe capture el mouse al arrastrar */
        .dragging iframe { pointer-events: none; }

        /* EDITOR Y OUTPUT */
        .CodeMirror { height: 100% !important; font-size: 14px; background: #1e1e1e !important; }
        iframe { width: 100%; height: 100%; border: none; }

        /* FOOTER */
        footer {
            height: 50px;
            background: var(--card);
            border-top: 1px solid var(--stroke);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            padding: 0 20px;
            font-size: 13px;
        }

        footer a {
            color: var(--text);
            text-decoration: none;
            transition: 0.2s;
        }
        footer a:hover { color: var(--primary); }

        .btn-sebas {
            background: var(--primary);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 700;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            main { flex-direction: column; }
            #resizer { width: 100%; height: 6px; cursor: row-resize; }
            header { height: 50px; }
            footer { height: auto; flex-direction: column; padding: 15px; gap: 10px; }
        }
    </style>
</head>
<body id="app-container">

    <header>
        <div class="brand">WILCHEZ <span class="grad">EDITOR</span></div>
        <div style="font-size: 12px; color: #a8adbd;">Output en vivo activado</div>
    </header>

    <main id="workspace">
        <div class="panel" id="left-panel">
            <textarea id="code-editor"></textarea>
        </div>

        <div id="resizer"></div>

        <div class="panel" id="right-panel">
            <iframe id="output-view"></iframe>
        </div>
    </main>

    <footer>
        <a href="https://wilchezdigital.onrender.com/" target="_blank">Mí Portafolio</a>
        <a href="https://sebasbot-specialoffer.onrender.com/" target="_blank" class="btn-sebas">SebasBot Gratis</a>
        <a href="https://www.linkedin.com/in/wilchez/" target="_blank">LinkedIn</a>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

    <script>
        // 1. Inicialización del Editor
        const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
            mode: "htmlmixed",
            theme: "dracula",
            lineNumbers: true,
            tabSize: 2,
            lineWrapping: true
        });

        // Contenido inicial
        editor.setValue(`<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #0b0c10; color: #ff6a00; font-family: sans-serif; display: grid; place-items: center; height: 100vh; margin: 0; }
    .box { border: 2px solid #ff6a00; padding: 20px; border-radius: 15px; text-align: center; }
  </style>
</head>
<body>
  <div class="box">
    <h1>SebasBot Editor</h1>
    <p>El código se actualiza instantáneamente.</p>
  </div>
</body>
</html>`);

        // 2. Lógica de Output en tiempo real
        const output = document.getElementById("output-view");
        const updateOutput = () => {
            const doc = output.contentWindow.document;
            doc.open();
            doc.write(editor.getValue());
            doc.close();
        };

        editor.on("change", updateOutput);
        updateOutput();

        // 3. Lógica del Resizer (Barra de desplazamiento) corregida
        const resizer = document.getElementById("resizer");
        const leftPanel = document.getElementById("left-panel");
        const workspace = document.getElementById("workspace");
        const appContainer = document.getElementById("app-container");

        let isDragging = false;

        const startDragging = (e) => {
            isDragging = true;
            resizer.classList.add("active");
            appContainer.classList.add("dragging");
        };

        const stopDragging = () => {
            isDragging = false;
            resizer.classList.remove("active");
            appContainer.classList.remove("dragging");
        };

        const onDrag = (e) => {
            if (!isDragging) return;

            const isMobile = window.innerWidth <= 768;
            
            if (isMobile) {
                // Desplazamiento Vertical (Móvil)
                const containerHeight = workspace.offsetHeight;
                const pointerY = e.touches ? e.touches[0].clientY : e.clientY;
                const topOffset = workspace.getBoundingClientRect().top;
                const percentage = ((pointerY - topOffset) / containerHeight) * 100;
                
                if (percentage > 10 && percentage < 90) {
                    leftPanel.style.flex = `0 0 ${percentage}%`;
                }
            } else {
                // Desplazamiento Horizontal (Escritorio)
                const containerWidth = workspace.offsetWidth;
                const pointerX = e.clientX;
                const percentage = (pointerX / containerWidth) * 100;

                if (percentage > 10 && percentage < 90) {
                    leftPanel.style.flex = `0 0 ${percentage}%`;
                }
            }
        };

        // Eventos de Mouse
        resizer.addEventListener("mousedown", startDragging);
        document.addEventListener("mousemove", onDrag);
        document.addEventListener("mouseup", stopDragging);

        // Eventos Táctiles
        resizer.addEventListener("touchstart", startDragging);
        document.addEventListener("touchmove", onDrag);
        document.addEventListener("touchend", stopDragging);

    </script>
</body>
</html>
